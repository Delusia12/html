<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>特殊字符</title>
</head>
<body>
  <h4>特殊字符</h4>
  <p>
    &nbsp; 空格
    &lt; 小于号
    &gt; 大于号
    &amp; 与号
    &copy; 版权符号
    &reg; 注册商标符号
    &trade; 商标符号
    &euro; 欧元符号
    &pound; 英镑符号
    &yen; 日元符号
    &cent; 分符号
    &times; 乘号
    &divide; 除号
  </p>
</body>
</html>
