<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>列表</title>
    
</head>
<body>
    <ul>
        <li>无序列表</li>
        <li>无序</li>
        <li>无序</li>
    </ul>
    <br />
    <ol>
        <li>有序列表</li>
        <li>有序</li>
        <li>有序</li>
        
    </ol>
    <br />
    <dl>
        <dt>自定义列表</dt>
        <dd>自定义</dd>
        <dd>自定义</dd>
    </dl>
</body>
</html>
