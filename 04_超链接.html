<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超链接</title>
</head>
<body>
    <h1>超链接的应用</h1>
    <p>HTML 文档中，超链接是指在一段文本中插入一个链接，使得用户可以点击该链接，跳转到另一个网页或文件。超链接的语法如下：</p>
    <p>比如，这是<a href="https://www.qq.com" target="_blank">qq</a>的超链接</p>
    <p>以及下载链接：<a href="ada.rar">下载ada.rar</a></p>
    链接是很重要的，尤其是下载链接
</body>
</html>
