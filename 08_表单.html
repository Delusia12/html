<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表单</title>
</head>

<body>
  <h4>表单</h4>

  <form action="">
    <!-- lable辅助标签用法一 ,label一个选项用一次-->
    <label>
      账号：<input type="text" placeholder="请输入账号" autocomplete="off">
    </label>
    <br />
    <!-- label辅助标签用法二 -->
    <label for="password">
      密码：<input type="password" id="password" placeholder="请输入密码" maxlength="6" autocomplete="off">
    </label>

    <br />
    性别：
    <label>
      <input type="radio" name="gender" value="1">男
    </label>
    <label>
      <input type="radio" name="gender" value="0">女
    </label>
    
    <br />
    爱好：
    <!-- 当<input type="checkbox" name="hobby" value="1" checked>篮球,默认选择篮球 -->
    <label>
      <input type="checkbox" name="hobby" value="1">篮球
    </label>
    <label>
      <input type="checkbox" name="hobby" value="2">足球
    </label>
    <label>
      <input type="checkbox" name="hobby" value="3">网球
    </label>
    <br />
    头像：
    <label>
      <input type="file" name="file" multiple accept=".png,.jpg">
    </label>
    <br />
    是否同意网站协议：
    <label>
      <input type="radio" name="协议" value="1" checked>是
    </label>
    <label>
      <input type="radio" name="协议" value="0">否
    </label>

    <br />
    <label>
      留言：<textarea placeholder="请输入留言"></textarea>
    </label>
    <br />
    城市：
    <select>
      <option name="北京" value="北京">北京</option>
      <option name="湖南" value="湖南" selected>湖南</option>
      <option name="上海" value="上海">上海</option>
    </select>
    <br />
    <button disabled>登录</button>

  </form>
</body>

</html>
